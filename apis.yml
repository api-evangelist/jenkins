aid: jenkins
name: Jenkins
description: >-
  Jenkins is the leading open source automation server that enables developers
  to reliably build, test, and deploy software. Jenkins exposes a
  machine-consumable Remote Access API for nearly every resource it manages,
  available in XML (with XPath filtering), JSON (with JSONP), and a
  Python-compatible variant, and supports HTTP Basic auth with API tokens for
  scripted clients.
