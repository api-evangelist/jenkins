aid: jenkins
name: Jenkins
description: >-
  Jenkins is an open source automation server which enables developers around
  the world to reliably build, test, and deploy their software. Jenkins provides
  a machine-consumable Remote Access API for its functionalities in XML, JSON,
  and Python formats.
